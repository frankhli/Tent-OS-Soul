# Tent OS Docker Compose —— all-in-one 模式（默认）
# 一键启动：docker-compose up
# 包含：NATS + Redis + Tent OS（所有 worker 在一个容器内）

version: "3.8"

services:
  nats:
    image: nats:2.11-alpine
    command: -js -m 8222
    ports:
      - "4222:4222"
      - "8222:8222"  # NATS 监控端口
    volumes:
      - nats_data:/data/jetstream
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  tent-os:
    build: .
    image: tent-os:latest
    ports:
      - "8000:8000"
    volumes:
      - tent_data:/app/data
      - ./skills:/app/skills  # Skills 目录（支持热更新）
      - ./workspace:/app/workspace  # 工作区文件（支持热更新）
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker（沙箱化需要）
    environment:
      - TENT_OS_NATS_URL=nats://nats:4222
      - TENT_OS_REDIS_URL=redis://redis:6379
      - TENT_OS_USE_REDIS=true
      - TENT_OS_DATA_DIR=/app/data
      - TENT_OS_CONFIG=/app/config/tent_os.docker.yaml
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  nats_data:
  redis_data:
  tent_data:
